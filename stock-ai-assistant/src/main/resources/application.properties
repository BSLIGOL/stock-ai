spring.application.name=stock-ai-assistant

# DB
spring.datasource.url=jdbc:postgresql://localhost:5432/stockdb
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# LangChain4j & Gemini API
gemini.api-key=${GEMINI_API_KEY:}
gemini.summary-model-name=gemini-3.1-flash-lite-preview
gemini.deep-analysis-model-name=gemini-2.5-pro
gemini.embedding-model-name=gemini-embedding-2-preview

# naver open api
naver.client-id=${NAVER_CLIENT_ID:}
naver.client-secret=${NAVER_CLIENT_SECRET:}

# Import secret properties for local dev (if file exists)
spring.config.import=optional:file:src/main/resources/application-secret.properties